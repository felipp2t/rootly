<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>web</title>
    <script>
      // Keys must match STORAGE_KEYS.THEME / STORAGE_KEYS.ACCENT in src/lib/storage.ts
      ;(() => {
        var storedTheme = localStorage.getItem('vite-ui-theme') || 'dark'
        var resolvedTheme =
          storedTheme === 'system'
            ? window.matchMedia('(prefers-color-scheme: dark)').matches
              ? 'dark'
              : 'light'
            : storedTheme
        document.documentElement.classList.add(resolvedTheme)

        var storedAccent = localStorage.getItem('vite-ui-accent') || 'green'
        document.documentElement.setAttribute('data-accent', storedAccent)
      })()
    </script>
  </head>
  <body class="h-svh font-display">
    <div id="root" class="h-full"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
